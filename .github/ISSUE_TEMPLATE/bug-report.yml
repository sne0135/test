name: Bug Report
description: File a bug report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for contributing!
        Please provide as much detail as possible so we can reproduce the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How do we see the bug ourselves?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Browser version, Node version, etc.
      placeholder: |
        - OS: macOS / Windows / Linux
        - Version: v1.2.3
        - Browser: Chrome 122
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any error logs here.
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
      description: Drag and drop images here to help us visualize the problem.